services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env.local
    ports:
      - "3001:3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - art-data:/data/art
      - db-data:/data/db
    environment:
      - ART_STORAGE_PATH=/data/art
      - ANALYTICS_DB_PATH=/data/db/analytics.db

volumes:
  art-data:
  db-data:
